<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメント</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="comment.css">

</head>

<body>
<div class="comment-container">

  <div class="tabs">
    <a href="index.html" class="tab">計算</a>
    <a href="spec.html" class="tab">使い方</a>
    <a href="comment.html" class="tab active">コメント</a>
  </div>

  <div class="list-box">
    <h2>コメント一覧</h2>
    <div class="button-group">
      <button onclick="setSort('time')">時間順</button>
      <button onclick="setSort('likes')">人気順</button>
    </div>
    <div id="list"></div>
  </div>

  <div class="post-box">
    <h2>コメント</h2>
    <input id="name" placeholder="名前(未記入ならランダムな名前)">
    <textarea id="text"></textarea>
    <div class="button-group">
      <button onclick="postComment()">投稿</button>
      <button onclick="rerollName()">名前を再抽選</button>
    </div>
  </div>

  <div class="ng-box">
    <h2>NGワード追加</h2>
    <input id="ngInput" placeholder="NGワード">
    <button onclick="addMyNG()">追加</button>
    <div id="ngList"></div>
    <h3>ID NG</h3>
    <div id="ngIdList"></div>
  </div>

  

</div>

<script type="module" src="comment.js"></script>

</body>
</html>
