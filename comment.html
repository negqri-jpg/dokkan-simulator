<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コメント</title>

<style>
    .tabs {
      display: flex;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;

      font-weight: bold;
      text-decoration: none;
      color: #00ffcc;

      background: linear-gradient(#111, #000);
      border: 2px solid #00ff66;

      box-shadow:
        0 0 6px #00ff66,
        inset 0 0 6px rgba(0,255,100,0.2);

      position: relative;
    }

    /* 選択中 */
    .tab.active {
      background: linear-gradient(#003300, #001100);
      color: #00ff66;
      box-shadow:
        0 0 12px #00ff66,
        inset 0 0 10px rgba(0,255,100,0.5);
    }

    /* 斜めカット */
    .tab::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      border-width: 0 0 18px 18px;
      border-style: solid;
      border-color: transparent transparent black transparent;
    }

    /* 押した感 */
    .tab:active {
      transform: scale(0.95);
    }


body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  padding: 12px;
}

textarea, input {
  width: 100%;
  margin-top: 6px;
  padding: 6px;
  background: black;
  color: #00ffcc;
  border: 1px solid #00ff66;
}

button {
  margin-top: 8px;
  padding: 8px;
  width: 100%;
}

.comment {
  border-bottom: 1px solid #333;
  margin-top: 10px;
  padding-bottom: 6px;
}

.name {
  color: #00ff66;
  font-weight: bold;
}

.time {
  font-size: 10px;
  color: #aaa;
}
</style>
</head>

<body>

  <div class="tabs">
    <a href="index.html" class="tab">計算</a>
    <a href="spec.html" class="tab">使い方</a>
    <a href="comment.html" class="tab active">コメント</a>
  </div>

<h1>コメント欄</h1>

<input id="name" placeholder="名前（未入力なら匿名）">

<textarea id="text" placeholder="コメントを書く"></textarea>

<button onclick="post()">投稿</button>

<h2>NGワード設定</h2>
<input id="ng" placeholder="カンマ区切り（例: ばか,しね）">
<button onclick="saveNG()">保存</button>

<h2>コメント一覧</h2>
<div id="list"></div>

<script>

function getNG() {
  return (localStorage.getItem("ng") || "").split(",");
}

function saveNG() {
  localStorage.setItem("ng", document.getElementById("ng").value);
  alert("保存した");
}

function post() {
  const name = document.getElementById("name").value || "匿名";
  const text = document.getElementById("text").value;

  const ngWords = getNG();

  for (let ng of ngWords) {
    if (ng && text.includes(ng)) {
      alert("NGワードが含まれています");
      return;
    }
  }

  const data = JSON.parse(localStorage.getItem("comments") || "[]");

  data.unshift({
    name,
    text,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("comments", JSON.stringify(data));

  document.getElementById("text").value = "";

  render();
}

function render() {
  const data = JSON.parse(localStorage.getItem("comments") || "[]");

  const list = document.getElementById("list");
  list.innerHTML = "";

  for (let c of data) {
    list.innerHTML += `
      <div class="comment">
        <div class="name">${c.name}</div>
        <div>${c.text}</div>
        <div class="time">${c.time}</div>
      </div>
    `;
  }
}

render();

</script>

</body>
</html>
